<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <!-- Arterial blood (bright oxygenated red) → Venous blood (dark deoxygenated maroon) -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CF2030"/>
      <stop offset="100%" stop-color="#4A0E20"/>
    </linearGradient>
  </defs>

  <!-- Background: square with NO rounded corners (macOS applies its own mask) -->
  <rect x="0" y="0" width="600" height="600" fill="url(#bgGrad)"/>

  <!-- Serpent -->
  <path d="
    M 480,60
    L 180,60
    A 60 60 0 0 0 180,180
    L 415,180
    A 60 60 0 0 1 415,300
    L 220,300
    A 60 60 0 0 0 220,420
    L 362,420
    A 60 60 0 0 1 362,540
    L 268,540
  " stroke="white" stroke-width="60" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Eye: exactly at path start = center of round end-cap -->
  <circle cx="480" cy="60" r="12" fill="#b51c28"/>
</svg>
