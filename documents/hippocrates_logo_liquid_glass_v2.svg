<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <!-- Warm neutral surface -->
    <linearGradient id="bgSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0e8e4"/>
      <stop offset="100%" stop-color="#d8c8c0"/>
    </linearGradient>

    <!-- Blood glass fill: arterial → venous, vivid throughout -->
    <linearGradient id="bloodGlass" x1="0.1" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#E02040" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#B81830" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6A1025" stop-opacity="0.85"/>
    </linearGradient>

    <!-- Deep core: richer center for volume, stays red -->
    <linearGradient id="deepCore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A01020" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7A0E1E" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Top specular (subtle) -->
    <linearGradient id="specular" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="15%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Bottom environment reflection -->
    <linearGradient id="envReflect" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.0"/>
      <stop offset="80%" stop-color="white" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.12"/>
    </linearGradient>

    <!-- Edge rim light -->
    <linearGradient id="edgeLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.85"/>
      <stop offset="30%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="white" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.35"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="innerDepth" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset dx="0" dy="4" result="shifted"/>
      <feFlood flood-color="#2a0008" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="shifted" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Red glow -->
    <filter id="outerGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="glow"/>
      <feFlood flood-color="#CF2030" flood-opacity="0.18" result="color"/>
      <feComposite in="color" in2="glow" operator="in" result="colorGlow"/>
      <feMerge>
        <feMergeNode in="colorGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Caustic blur -->
    <filter id="causticBlur">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

    <!-- Eye shadow -->
    <filter id="eyeShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="0" dy="1" result="shifted"/>
      <feFlood flood-color="#1a0008" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="shifted" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Serpent centerline (identical to original) -->
    <path id="serpentPath" d="
      M 480,60
      L 180,60
      A 60 60 0 0 0 180,180
      L 415,180
      A 60 60 0 0 1 415,300
      L 220,300
      A 60 60 0 0 0 220,420
      L 362,420
      A 60 60 0 0 1 362,540
      L 268,540
    "/>
  </defs>

  <!-- === BACKGROUND === -->
  <rect x="0" y="0" width="600" height="600" rx="70" ry="70" fill="url(#bgSoft)"/>

  <!-- === GLASS SERPENT === -->
  <g>

    <!-- Layer 1: Blood glass body -->
    <use href="#serpentPath" stroke="url(#bloodGlass)" stroke-width="60"
         fill="none" stroke-linecap="round" stroke-linejoin="round"
         filter="url(#innerDepth)"/>

    <!-- Layer 2: Deep core for richness -->
    <use href="#serpentPath" stroke="url(#deepCore)" stroke-width="60"
         fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Layer 3: Top specular -->
    <use href="#serpentPath" stroke="url(#specular)" stroke-width="60"
         fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Layer 4: Environment reflection -->
    <use href="#serpentPath" stroke="url(#envReflect)" stroke-width="60"
         fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Layer 5: Caustic light streak -->
    <use href="#serpentPath" stroke="white" stroke-width="8"
         fill="none" stroke-linecap="round" stroke-linejoin="round"
         opacity="0.1" filter="url(#causticBlur)"/>
  </g>

  <!-- === EYE === -->
  <g filter="url(#eyeShadow)">
    <!-- Recessed socket -->
    <circle cx="480" cy="60" r="11" fill="#1a0008" opacity="0.75"/>
    <!-- Iris ring -->
    <circle cx="480" cy="60" r="8" fill="none" stroke="#3a0a14" stroke-width="2.5" opacity="0.5"/>
    <!-- Pupil -->
    <circle cx="480" cy="60" r="5" fill="#0a0004" opacity="0.85"/>
    <!-- Specular glint -->
    <circle cx="478" cy="58" r="2.5" fill="white" opacity="0.7"/>
  </g>
</svg>
