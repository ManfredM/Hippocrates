<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" width="720" height="440" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="editorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="engineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CF2030"/>
      <stop offset="100%" stop-color="#9A1520"/>
    </linearGradient>
    <linearGradient id="moduleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Editor Box -->
  <rect x="40" y="20" width="640" height="80" rx="12" fill="url(#editorGrad)" filter="url(#shadow)"/>
  <text x="360" y="52" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Hippocrates Editor</text>
  <text x="360" y="76" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="13">SwiftUI · Code Editing · Timeline Visualization · Swift Charts</text>

  <!-- FFI Connection -->
  <line x1="360" y1="100" x2="360" y2="160" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="310" y="117" width="100" height="26" rx="13" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="360" y="135" text-anchor="middle" fill="#64748B" font-size="12" font-weight="600">C FFI Layer</text>

  <!-- Engine Box -->
  <rect x="40" y="160" width="640" height="260" rx="12" fill="url(#engineGrad)" filter="url(#shadow)"/>
  <text x="360" y="192" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Hippocrates Engine</text>
  <text x="360" y="212" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Rust · Edition 2024</text>

  <!-- Parser Module -->
  <rect x="70" y="232" width="180" height="160" rx="8" fill="url(#moduleGrad)" filter="url(#shadow)"/>
  <text x="160" y="258" text-anchor="middle" fill="#92400E" font-size="14" font-weight="bold">Parser</text>
  <line x1="90" y1="268" x2="230" y2="268" stroke="#D97706" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="160" y="290" text-anchor="middle" fill="#78350F" font-size="12">PEG Grammar</text>
  <text x="160" y="312" text-anchor="middle" fill="#78350F" font-size="12">pest Parser</text>
  <text x="160" y="334" text-anchor="middle" fill="#78350F" font-size="12">AST Builder</text>
  <text x="160" y="356" text-anchor="middle" fill="#78350F" font-size="12">Formatter</text>

  <!-- Runtime Module -->
  <rect x="270" y="232" width="180" height="160" rx="8" fill="url(#moduleGrad)" filter="url(#shadow)"/>
  <text x="360" y="258" text-anchor="middle" fill="#92400E" font-size="14" font-weight="bold">Runtime</text>
  <line x1="290" y1="268" x2="430" y2="268" stroke="#D97706" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="360" y="290" text-anchor="middle" fill="#78350F" font-size="12">Executor</text>
  <text x="360" y="312" text-anchor="middle" fill="#78350F" font-size="12">Scheduler</text>
  <text x="360" y="334" text-anchor="middle" fill="#78350F" font-size="12">Evaluator</text>
  <text x="360" y="356" text-anchor="middle" fill="#78350F" font-size="12">Session State</text>

  <!-- Validator Module -->
  <rect x="470" y="232" width="180" height="160" rx="8" fill="url(#moduleGrad)" filter="url(#shadow)"/>
  <text x="560" y="258" text-anchor="middle" fill="#92400E" font-size="14" font-weight="bold">Validator</text>
  <line x1="490" y1="268" x2="630" y2="268" stroke="#D97706" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="560" y="290" text-anchor="middle" fill="#78350F" font-size="12">Semantic Analysis</text>
  <text x="560" y="312" text-anchor="middle" fill="#78350F" font-size="12">Coverage Check</text>
  <text x="560" y="334" text-anchor="middle" fill="#78350F" font-size="12">Data Flow</text>
  <text x="560" y="356" text-anchor="middle" fill="#78350F" font-size="12">Interval Validation</text>
</svg>
